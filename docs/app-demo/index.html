<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b2f57">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="アシストくん">
<title>アシストくん | 社員を守るAI相談アプリ</title>
<style>
:root {
  --navy: #0b2f57;
  --navy2: #123f70;
  --blue: #eaf5ff;
  --blue2: #cfe7ff;
  --white: #ffffff;
  --line: #d7e6f3;
  --text: #18324a;
  --muted: #64788b;
  --green: #0f8f72;
  --red: #c83a3a;
  --shadow: 0 14px 34px rgba(11, 47, 87, 0.12);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background: linear-gradient(180deg, #f8fcff 0%, #edf6ff 100%);
  line-height: 1.7;
  overflow-x: hidden;
}
button, input, textarea, select { font: inherit; }
button { cursor: pointer; touch-action: manipulation; }
.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255, 255, 255, 0.96);
  border-bottom: 3px solid var(--navy);
  box-shadow: 0 8px 22px rgba(11, 47, 87, 0.08);
}
.header-inner {
  max-width: 1120px;
  margin: 0 auto;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo {
  width: 108px;
  height: 58px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #ffffff url("nsl-soudansho-logo.png") center / contain no-repeat;
  color: var(--white);
  display: grid;
  place-items: center;
  font-weight: 900;
  box-shadow: var(--shadow);
  flex: 0 0 auto;
}
.logo img { display: none; }
.title-block { flex: 1; min-width: 0; }
.title-block h1 {
  margin: 0;
  font-size: clamp(22px, 4.8vw, 34px);
  line-height: 1.2;
  color: var(--navy);
  letter-spacing: 0;
}
.title-block p { margin: 3px 0 0; color: var(--muted); font-size: 14px; }
.demo-label {
  display: inline-flex;
  align-items: center;
  margin-bottom: 4px;
  padding: 3px 9px;
  border-radius: 999px;
  background: #fff4d6;
  border: 1px solid #f0c85a;
  color: #7a5400;
  font-size: 12px;
  font-weight: 900;
}
.demo-notice {
  margin: 0 0 14px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #f0c85a;
  background: #fffaf0;
  color: #5d4300;
  font-weight: 800;
  font-size: 14px;
}
.status {
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--blue);
  border: 1px solid var(--blue2);
  color: var(--navy);
  font-weight: 800;
  white-space: nowrap;
  font-size: 13px;
}
.wrap {
  width: min(1120px, 100%);
  margin: 0 auto;
  padding: 18px 14px 42px;
}
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 0 0 14px;
}
.tab-btn {
  min-height: 56px;
  border: 2px solid var(--line);
  border-radius: 8px;
  background: var(--white);
  color: var(--navy);
  font-size: 18px;
  font-weight: 900;
}
.tab-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
.screen { display: none; }
.screen.active { display: block; }
.panel {
  background: rgba(255,255,255,0.96);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}
.user-layout {
  display: block;
}
.side { padding: 16px; }
.guide {
  padding: 14px;
  border-radius: 8px;
  background: var(--blue);
  border: 1px solid var(--blue2);
  margin-bottom: 14px;
}
.guide strong { color: var(--navy); }
.category-grid {
  display: grid;
  gap: 10px;
}
.category-btn {
  min-height: 82px;
  width: 100%;
  padding: 14px;
  border: 2px solid var(--line);
  border-radius: 8px;
  background: var(--white);
  color: var(--text);
  display: grid;
  grid-template-columns: 42px 1fr 24px;
  gap: 10px;
  align-items: center;
  text-align: left;
}
.category-btn.active, .category-btn:hover {
  border-color: var(--navy);
  background: #f5fbff;
}
.cat-icon { font-size: 30px; text-align: center; }
.cat-name { font-size: 18px; font-weight: 900; color: var(--navy); line-height: 1.25; }
.cat-help { font-size: 13px; color: var(--muted); margin-top: 2px; }
.arrow { font-size: 26px; color: var(--navy); text-align: right; }
.chat {
  min-height: 720px;
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.chat-head {
  padding: 16px;
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 12px;
}
.bot-face {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--white) url("nsl-soudansho-logo.png") center / 88% auto no-repeat;
  color: var(--navy);
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  box-shadow: 0 6px 18px rgba(11, 47, 87, 0.18);
}
.chat-head h2 { margin: 0; font-size: 22px; line-height: 1.2; }
.chat-head p { margin: 3px 0 0; color: rgba(255,255,255,0.86); font-size: 14px; }
.messages {
  flex: 1;
  overflow: auto;
  padding: 16px;
  background:
    linear-gradient(rgba(11,47,87,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(11,47,87,0.035) 1px, transparent 1px),
    #fbfdff;
  background-size: 34px 34px;
}
.msg {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  margin-bottom: 12px;
}
.msg.user { justify-content: flex-end; }
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: var(--navy);
  color: var(--white);
  flex: 0 0 auto;
  font-weight: 900;
}
.avatar.bot-logo {
  background: var(--white) url("nsl-soudansho-logo.png") center / 86% auto no-repeat;
  border: 2px solid var(--navy);
  color: transparent;
}
.bubble {
  max-width: min(82%, 640px);
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 16px;
  white-space: pre-wrap;
}
.user .bubble { background: var(--blue); border-color: var(--blue2); }
.choices {
  display: grid;
  gap: 10px;
  margin: 10px 0 16px 46px;
}
.choice-btn {
  min-height: 64px;
  padding: 12px 14px;
  border-radius: 8px;
  border: 2px solid var(--blue2);
  background: var(--white);
  text-align: left;
  font-size: 17px;
  font-weight: 800;
  color: var(--navy);
}
.choice-btn:hover { background: var(--blue); border-color: var(--navy); }
.answer-card {
  margin: 10px 0 16px 46px;
  background: var(--white);
  border: 1px solid var(--line);
  border-left: 6px solid var(--green);
  border-radius: 8px;
  padding: 14px;
}
.answer-card h3 { margin: 0 0 8px; color: var(--navy); font-size: 20px; }
.answer-card ul { margin: 8px 0 0; padding-left: 1.2em; }
.chat-input {
  padding: 12px;
  border-top: 1px solid var(--line);
  background: var(--white);
  display: grid;
  grid-template-columns: 50px 1fr 58px;
  gap: 8px;
  align-items: end;
}
.icon-btn, .send-btn, .voice-btn {
  border: 0;
  border-radius: 8px;
  min-height: 50px;
  font-size: 22px;
  font-weight: 900;
}
.icon-btn { background: var(--blue); color: var(--navy); border: 1px solid var(--blue2); }
.icon-btn.on { background: #ffecec; color: var(--red); border-color: #ffc0c0; }
.send-btn { background: var(--navy); color: var(--white); }
.chat-input textarea {
  min-height: 50px;
  max-height: 140px;
  resize: none;
  border: 2px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 16px;
}
.toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.tool-btn {
  min-height: 46px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--white);
  color: var(--navy);
  font-weight: 900;
  padding: 10px 14px;
}
.admin-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 14px;
}
.admin-side, .admin-main { padding: 16px; }
.admin-list { display: grid; gap: 8px; }
.admin-cat-btn {
  min-height: 52px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--white);
  text-align: left;
  padding: 10px 12px;
  color: var(--navy);
  font-weight: 900;
}
.admin-cat-btn.active { background: var(--navy); color: var(--white); }
.form-grid { display: grid; gap: 12px; }
.field label {
  display: block;
  font-weight: 900;
  color: var(--navy);
  margin-bottom: 5px;
}
.field input, .field textarea, .field select {
  width: 100%;
  border: 2px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  background: var(--white);
}
.field textarea { min-height: 110px; resize: vertical; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.admin-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.primary, .danger, .plain {
  min-height: 48px;
  border-radius: 8px;
  border: 0;
  padding: 10px 16px;
  font-weight: 900;
}
.primary { background: var(--navy); color: var(--white); }
.danger { background: var(--red); color: var(--white); }
.plain { background: var(--blue); color: var(--navy); border: 1px solid var(--blue2); }
.doc-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin: 14px 0;
}
.doc-card {
  padding: 14px;
  border: 1px solid var(--line);
  background: var(--white);
  border-radius: 8px;
}
.doc-card h3 { margin: 0 0 6px; color: var(--navy); font-size: 18px; }
.doc-card p { margin: 0; color: var(--muted); font-size: 14px; }
.toast {
  position: fixed;
  right: 14px;
  bottom: 14px;
  z-index: 40;
  background: var(--navy);
  color: var(--white);
  border-radius: 8px;
  padding: 12px 14px;
  box-shadow: var(--shadow);
  display: none;
  font-weight: 900;
}
@media (max-width: 900px) {
  .admin-layout { grid-template-columns: 1fr; }
  .chat { min-height: 640px; }
  .doc-grid { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .app-header { position: sticky; }
  .header-inner {
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
  }
  .logo {
    width: 82px;
    height: 46px;
    border-radius: 8px;
    box-shadow: 0 8px 18px rgba(11, 47, 87, 0.10);
  }
  .title-block h1 {
    font-size: 20px;
    line-height: 1.18;
  }
  .title-block p {
    font-size: 12px;
    line-height: 1.45;
    margin-top: 4px;
  }
  .status { display: none; }
  .wrap {
    padding: 8px 8px max(18px, env(safe-area-inset-bottom));
  }
  .tabs {
    gap: 8px;
    margin-bottom: 8px;
  }
  .tab-btn {
    min-height: 52px;
    font-size: 16px;
    line-height: 1.25;
    padding: 8px 6px;
  }
  .category-btn { min-height: 76px; }
  .chat {
    min-height: calc(100dvh - 178px);
    border-radius: 8px;
  }
  .chat-head {
    padding: 12px;
    gap: 10px;
  }
  .bot-face {
    width: 44px;
    height: 44px;
  }
  .chat-head h2 {
    font-size: 21px;
  }
  .chat-head p {
    font-size: 13px;
    line-height: 1.5;
  }
  .messages {
    padding: 12px 10px;
  }
  .msg {
    gap: 8px;
    margin-bottom: 10px;
  }
  .avatar {
    width: 34px;
    height: 34px;
  }
  .bubble {
    max-width: calc(100% - 46px);
    font-size: 15px;
    line-height: 1.75;
    padding: 11px 12px;
  }
  .choices, .answer-card { margin-left: 0; }
  .choice-btn {
    min-height: 58px;
    font-size: 16px;
    padding: 11px 12px;
  }
  .answer-card {
    padding: 12px;
  }
  .answer-card h3 {
    font-size: 18px;
  }
  .chat-input {
    grid-template-columns: 46px 1fr 50px;
    gap: 6px;
    padding: 10px;
  }
  .icon-btn, .send-btn, .voice-btn {
    min-height: 48px;
    font-size: 20px;
  }
  .chat-input textarea {
    min-height: 48px;
    font-size: 16px;
    padding: 9px 10px;
  }
  .toolbar {
    gap: 6px;
  }
  .tool-btn {
    flex: 1 1 30%;
    min-height: 42px;
    padding: 8px 6px;
    font-size: 14px;
  }
  .row { grid-template-columns: 1fr; }
}
</style>
</head>

      <h1>アシストくん 社員を守るAI相談</h1>
      <p>外部説明用のデモ画面です。本番運用前のサンプルとして確認できます。</p>

<main class="wrap">
  <div class="demo-notice">このページは、提案・説明用のデモ版です。実際の社員相談データは保存・送信されません。</div>
  <div class="tabs" role="tablist" aria-label="画面切替">
    <button class="tab-btn active" id="userTab" type="button" onclick="switchScreen('user')">社員が使う画面</button>
    <button class="tab-btn" id="adminTab" type="button" onclick="switchScreen('admin')">管理者が直す画面</button>
  </div>

  <section class="screen active" id="userScreen">
    <div class="user-layout">
      <section class="panel chat" aria-label="AI相談チャット">
        <div class="chat-head">
          <div class="bot-face" aria-label="NSL相談所"></div>
          <div>
            <h2>アシストくん</h2>
            <p id="chatSub">まず質問してください。内容から必要な項目だけ表示します。</p>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <button class="icon-btn" id="micBtn" type="button" title="音声入力" onclick="toggleMic()">🎤</button>
          <textarea id="freeInput" rows="1" placeholder="まず質問してください" oninput="autoGrow(this)" onkeydown="enterSend(event)"></textarea>
          <button class="send-btn" type="button" onclick="sendFree()">▶</button>
        </div>
        <div class="toolbar" style="padding:0 12px 12px;margin-top:0;">
          <button class="tool-btn" type="button" onclick="resetChat()">最初から</button>
          <button class="tool-btn" type="button" onclick="speakLastAnswer()">回答を読む</button>
          <button class="tool-btn" type="button" onclick="stopSpeak()">音声停止</button>
        </div>
      </section>
    </div>
  </section>

  <section class="screen" id="adminScreen">
    <div class="admin-layout">
      <aside class="panel admin-side">
        <h2 style="margin:0 0 10px;color:var(--navy);">相談カテゴリ</h2>
        <div class="admin-list" id="adminCategoryList"></div>
        <div class="admin-actions">
          <button class="primary" type="button" onclick="addCategory()">カテゴリ追加</button>
          <button class="plain" type="button" onclick="restoreDefault()">初期データに戻す</button>
        </div>
      </aside>

      <section class="panel admin-main">
        <h2 style="margin:0 0 10px;color:var(--navy);">質問・回答の編集</h2>
        <div class="form-grid">
          <div class="row">
            <div class="field">
              <label for="catName">カテゴリ名</label>
              <input id="catName" type="text">
            </div>
            <div class="field">
              <label for="catIcon">アイコン</label>
              <input id="catIcon" type="text">
            </div>
          </div>
          <div class="field">
            <label for="catHelp">カテゴリ説明</label>
            <input id="catHelp" type="text">
          </div>
          <div class="field">
            <label for="itemSelect">3つの選択肢</label>
            <select id="itemSelect" onchange="loadItemForm()"></select>
          </div>
          <div class="field">
            <label for="itemTitle">質問項目名</label>
            <input id="itemTitle" type="text">
          </div>
          <div class="field">
            <label for="itemAnswer">AI回答内容</label>
            <textarea id="itemAnswer"></textarea>
          </div>
          <div class="field">
            <label for="itemAction">次にやること</label>
            <textarea id="itemAction"></textarea>
          </div>
        </div>
        <div class="admin-actions">
          <button class="primary" type="button" onclick="saveAdmin()">保存する</button>
          <button class="plain" type="button" onclick="addItem()">選択肢を追加</button>
          <button class="danger" type="button" onclick="deleteItem()">選択肢を削除</button>
          <button class="danger" type="button" onclick="deleteCategory()">カテゴリを削除</button>
        </div>
        <p style="color:var(--muted);margin:14px 0 0;">注意：このデモ版は、このブラウザの中に保存します。会社全員で共有する本番版では、サーバー側の保存場所に変更します。</p>
      </section>
    </div>
  </section>
</main>

    },

        {

          action: "1. 指示内容をメモする\n2. LINEやメールを保存する\n3. 社内相談窓口へ共有する"
        },

          answer: "匿名相談は、初期相談として有効です。\n\nただし、会社が正式に調査するには、日時・場所・内容などの事実情報が必要になります。個人名を出す前に、まず状況を整理しましょう。",
          action: "1. 個人名を伏せて状況を書く\n2. 日時と場所を書く\n3. 証拠の有無を書く\n4. 相談窓口へ送る"

let appData = loadData();

function loadData() {
  try {
    const saved = localStorage.getItem(STORE_KEY);
    return saved ? JSON.parse(saved) : structuredClone(defaultData);
  } catch (e) {
    return JSON.parse(JSON.stringify(defaultData));
  }
}

function saveData() {
  localStorage.setItem(STORE_KEY, JSON.stringify(appData));
}

function esc(text) {
  return String(text || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function nl2br(text) {
  return esc(text).replace(/\n/g, "<br>");
}

function switchScreen(name) {
  document.getElementById("userScreen").classList.toggle("active", name === "user");
  document.getElementById("adminScreen").classList.toggle("active", name === "admin");
  document.getElementById("userTab").classList.toggle("active", name === "user");
  document.getElementById("adminTab").classList.toggle("active", name === "admin");
  if (name === "admin") renderAdmin();
}

function renderCategories() {
  const grid = document.getElementById("categoryGrid");
  if (!grid) return;
  grid.innerHTML = "";
  appData.categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "category-btn" + (cat.id === selectedCategoryId ? " active" : "");
    btn.innerHTML = `
      <div class="cat-icon">${esc(cat.icon)}</div>
      <div><div class="cat-name">${esc(cat.name)}</div><div class="cat-help">${esc(cat.help)}</div></div>
      <div class="arrow">›</div>
    `;
    btn.onclick = () => selectCategory(cat.id);
    grid.appendChild(btn);
  });
}

function resetChat() {
  document.getElementById("messages").innerHTML = "";
  document.getElementById("chatSub").textContent = "まず質問してください。内容から必要な項目だけ表示します。";
  addBot("こんにちは。アシストくんです。\n\nまず質問してください。\n\n例：\n・お客様から強く怒られた\n・提出書類で不備が出た\n・新人に何を教えればいいかわからない\n・これはコンプラ違反か迷っている\n\n質問内容から、必要な項目だけ表示します。");
}

function selectCategory(id) {
  selectedCategoryId = id;
  renderCategories();
  const cat = getCat(id);
  addUser(`${cat.icon} ${cat.name}`);
  addBot(`${cat.name}ですね。\n近い内容を選んでください。`);
  showItemChoices(cat);
  document.getElementById("chatSub").textContent = `${cat.name}の相談中です。`;
}

function showCategoryChoices() {
  const wrap = document.createElement("div");
  wrap.className = "choices";
  appData.categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "choice-btn";
    btn.textContent = `${cat.icon} ${cat.name}`;
    btn.onclick = () => selectCategory(cat.id);
    wrap.appendChild(btn);
  });
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}

function showItemChoices(cat) {
  const wrap = document.createElement("div");
  wrap.className = "choices";
  cat.items.slice(0, 3).forEach(item => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "choice-btn";
    btn.textContent = item.title;
    btn.onclick = () => showAnswer(cat, item);
    wrap.appendChild(btn);
  });
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}

function showAnswer(cat, item) {
  addUser(item.title);
  const answer = `${cat.icon} ${item.title}\n\n${item.answer}\n\n次にやること：\n${item.action}`;
  lastAnswerText = answer;
  const card = document.createElement("div");
  card.className = "answer-card";
  card.innerHTML = `
    <h3>${esc(cat.icon)} ${esc(item.title)}</h3>
    <div>${nl2br(item.answer)}</div>
    <h3 style="margin-top:14px;">次にやること</h3>
    <div>${nl2br(item.action)}</div>
    <div class="toolbar">
      <button class="tool-btn" type="button" onclick="speakLastAnswer()">音声で聞く</button>
      <button class="tool-btn" type="button" onclick="showItemChoices(getCat('${cat.id}'))">同じカテゴリで選び直す</button>
    </div>
  `;
  document.getElementById("messages").appendChild(card);
  speak(answer);
  scrollBottom();
}

function addBot(text) {
  addMessage("bot", text);
  lastAnswerText = text;
}

function addUser(text) {
  addMessage("user", text);
}

function addMessage(role, text) {
  const row = document.createElement("div");
  row.className = `msg ${role}`;
  if (role === "bot") {
    row.innerHTML = `<div class="avatar bot-logo" aria-label="NSL相談所"></div><div class="bubble">${nl2br(text)}</div>`;
  } else {
    row.innerHTML = `<div class="bubble">${nl2br(text)}</div><div class="avatar">社</div>`;
  }
  document.getElementById("messages").appendChild(row);
  scrollBottom();
}

function sendFree() {
  const input = document.getElementById("freeInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  autoGrow(input);
  addUser(text);
  const cat = getBestCategory(text);
  selectedCategoryId = cat.id;
  renderCategories();
  const reply = `質問内容から判断しました。\n\n近い相談は「${cat.name}」です。\n下の3つから、今の状況に一番近いものを選んでください。`;
  addBot(reply);
  showItemChoices(cat);
  document.getElementById("chatSub").textContent = `${cat.name}の候補を表示しています。`;
  speak(reply);
}

function getBestCategory(text) {
  let cat = appData.categories.find(c => c.items.some(i => text.includes(i.title.slice(0, 4))));
  if (!cat) {
    if (/クレーム|怒|謝罪|お客様|客|強く|文句|苦情|炎上|責め/.test(text)) cat = getCat("claim");
    else if (/書類|申込|不備|提出/.test(text)) cat = getCat("docs");
    else if (/新人|教育|研修|部下|ロープレ|同行|教え/.test(text)) cat = getCat("ojt");
    else if (/不正|違反|匿名|コンプラ|指示|ルール|ハラスメント|パワハラ|セクハラ|無理/.test(text)) cat = getCat("comply");
    else if (/商品|料金|プラン|説明|サービス|トーク|案内|特徴/.test(text)) cat = getCat("products");
    else cat = getCat("qa");
  }
  return cat;
}

function enterSend(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendFree();
  }
}

function autoGrow(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}

function scrollBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

function getCat(id) {
  return appData.categories.find(c => c.id === id) || appData.categories[0];
}

function setupVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    document.getElementById("freeInput").value = e.results[0][0].transcript;
    autoGrow(document.getElementById("freeInput"));
    stopMic();
    setTimeout(sendFree, 250);
  };
  recognition.onerror = stopMic;
  recognition.onend = stopMic;
}

function toggleMic() {
  if (!recognition) {
    showToast("音声入力はChromeで使える場合があります");
    return;
  }
  isRecording ? stopMic() : startMic();
}

function startMic() {
  isRecording = true;
  document.getElementById("micBtn").classList.add("on");
  document.getElementById("micBtn").textContent = "■";
  recognition.start();
}

function stopMic() {
  isRecording = false;
  document.getElementById("micBtn").classList.remove("on");
  document.getElementById("micBtn").textContent = "🎤";
  try { recognition && recognition.stop(); } catch (e) {}
}

function speak(text) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP";
  u.rate = 0.95;
  u.pitch = 1;
  window.speechSynthesis.speak(u);
}

function speakLastAnswer() {
  if (lastAnswerText) speak(lastAnswerText);
}

function stopSpeak() {
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
}

function renderAdmin() {
  const list = document.getElementById("adminCategoryList");
  list.innerHTML = "";
  appData.categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "admin-cat-btn" + (cat.id === selectedAdminCategoryId ? " active" : "");
    btn.textContent = `${cat.icon} ${cat.name}`;
    btn.onclick = () => {
      selectedAdminCategoryId = cat.id;
      selectedAdminItemId = "";
      renderAdmin();
    };
    list.appendChild(btn);
  });
  loadCatForm();
}

function loadCatForm() {
  const cat = getCat(selectedAdminCategoryId);
  document.getElementById("catName").value = cat.name;
  document.getElementById("catIcon").value = cat.icon;
  document.getElementById("catHelp").value = cat.help;
  const sel = document.getElementById("itemSelect");
  sel.innerHTML = "";
  cat.items.forEach(item => {
    const opt = document.createElement("option");
    opt.value = item.id;
    opt.textContent = item.title;
    sel.appendChild(opt);
  });
  selectedAdminItemId = selectedAdminItemId || (cat.items[0] && cat.items[0].id) || "";
  sel.value = selectedAdminItemId;
  loadItemForm();
}

function loadItemForm() {
  const cat = getCat(selectedAdminCategoryId);
  selectedAdminItemId = document.getElementById("itemSelect").value;
  const item = cat.items.find(i => i.id === selectedAdminItemId) || cat.items[0];
  if (!item) {
    document.getElementById("itemTitle").value = "";
    document.getElementById("itemAnswer").value = "";
    document.getElementById("itemAction").value = "";
    return;
  }
  document.getElementById("itemTitle").value = item.title;
  document.getElementById("itemAnswer").value = item.answer;
  document.getElementById("itemAction").value = item.action;
}

function saveAdmin() {
  const cat = getCat(selectedAdminCategoryId);
  cat.name = document.getElementById("catName").value.trim() || "未設定カテゴリ";
  cat.icon = document.getElementById("catIcon").value.trim() || "📌";
  cat.help = document.getElementById("catHelp").value.trim() || "説明未設定";
  const item = cat.items.find(i => i.id === selectedAdminItemId);
  if (item) {
    item.title = document.getElementById("itemTitle").value.trim() || "未設定の質問";
    item.answer = document.getElementById("itemAnswer").value.trim() || "回答を入力してください。";
    item.action = document.getElementById("itemAction").value.trim() || "次にやることを入力してください。";
  }
  saveData();
  renderCategories();
  renderAdmin();
  showToast("保存しました");
}

function addCategory() {
  const id = "cat-" + Date.now();
  appData.categories.push({
    id,
    icon: "📌",
    name: "新しいカテゴリ",
    help: "説明を入力してください",
    items: [
      { id: id + "-1", title: "選択肢1", answer: "回答を入力してください。", action: "次にやることを入力してください。" },
      { id: id + "-2", title: "選択肢2", answer: "回答を入力してください。", action: "次にやることを入力してください。" },
      { id: id + "-3", title: "選択肢3", answer: "回答を入力してください。", action: "次にやることを入力してください。" }
    ]
  });
  selectedAdminCategoryId = id;
  saveData();
  renderCategories();
  renderAdmin();
  showToast("カテゴリを追加しました");
}

function addItem() {
  const cat = getCat(selectedAdminCategoryId);
  const id = selectedAdminCategoryId + "-item-" + Date.now();
  cat.items.push({ id, title: "新しい選択肢", answer: "回答を入力してください。", action: "次にやることを入力してください。" });
  selectedAdminItemId = id;
  saveData();
  renderAdmin();
  showToast("選択肢を追加しました");
}

function deleteItem() {
  const cat = getCat(selectedAdminCategoryId);
  if (cat.items.length <= 1) {
    showToast("選択肢は最低1つ必要です");
    return;
  }
  cat.items = cat.items.filter(i => i.id !== selectedAdminItemId);
  selectedAdminItemId = "";
  saveData();
  renderAdmin();
  showToast("選択肢を削除しました");
}

function deleteCategory() {
  if (appData.categories.length <= 1) {
    showToast("カテゴリは最低1つ必要です");
    return;
  }
  appData.categories = appData.categories.filter(c => c.id !== selectedAdminCategoryId);
  selectedAdminCategoryId = appData.categories[0].id;
  selectedCategoryId = selectedAdminCategoryId;
  saveData();
  renderCategories();
  renderAdmin();
  resetChat();
  showToast("カテゴリを削除しました");
}

function restoreDefault() {
  appData = JSON.parse(JSON.stringify(defaultData));
  selectedCategoryId = "products";
  selectedAdminCategoryId = "products";
  selectedAdminItemId = "";
  saveData();
  renderCategories();
  renderAdmin();
  resetChat();
  showToast("初期データに戻しました");
}

function showToast(text) {
  const t = document.getElementById("toast");
  t.textContent = text;
  t.style.display = "block";
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => t.style.display = "none", 2200);
}

setupVoice();
renderCategories();
resetChat();
</script>
